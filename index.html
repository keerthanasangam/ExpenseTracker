<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Premium</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>Expense Tracker</h1>
                <p>Manage your finances seamlessly</p>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- Balance Card -->
        <section class="balance-card">
            <div class="balance-info">
                <h2>Total Balance</h2>
                <h1 id="balance">₹0.00</h1>
            </div>
            <div class="balance-icon">
                <i class="fa-solid fa-wallet"></i>
            </div>
        </section>

        <div class="main-content">
            <!-- Left Column: Forms -->
            <div class="controls-section">
                <!-- Configure Balance -->
                <section class="control-card">
                    <h3><i class="fa-solid fa-gear"></i> Initial Setup</h3>
                    <form id="balance-form" class="modern-form">
                        <div class="form-group">
                            <label for="initial-balance">Starting Balance</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">₹</span>
                                <input type="number" id="initial-balance" placeholder="0.00" min="0" step="0.01"
                                    required>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">Update Balance</button>
                            <button type="button" id="reset-btn" class="btn btn-danger btn-icon" title="Reset all data">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Add Spend -->
                <section class="control-card">
                    <h3><i class="fa-solid fa-file-invoice-dollar"></i> New Transaction</h3>
                    <form id="transaction-form" class="modern-form">
                        <div class="form-group">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="e.g. Groceries, Rent..." required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">₹</span>
                                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-plus"></i> Add Expense
                        </button>
                    </form>
                </section>
            </div>

            <!-- Right Column: History -->
            <div class="history-section">
                <!-- History -->
                <section class="history-card">
                    <div class="history-header">
                        <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h3>
                    </div>
                    <!-- Empty state illustration container (handled by JS) -->
                    <div id="empty-state" class="empty-state hidden">
                        <i class="fa-solid fa-receipt"></i>
                        <p>No transactions yet</p>
                    </div>
                    <ul id="list" class="transaction-list">
                        <!-- Transactions will be rendered here -->
                    </ul>
                </section>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="scripts.js"></script>
</body>

</html>
